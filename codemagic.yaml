workflows:
  android-debug:
    name: GAP Counter
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Generate Gradle Wrapper
        script: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
      - name: Build Debug APK
        script: ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
